<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Women's Day Special</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="landing-page" class="page-container active">
        <div class="content">
            <h1>WELCOME</h1>
            <p>Please enter your name below.</p>
            <form id="name-form">
                <input type="text" id="name-input" placeholder="YOUR NAME" required autocomplete="off">
                <button type="submit">ENTER</button>
            </form>
        </div>
    </div>

    <div id="home-page" class="page-container">
        <div class="content">
            <h1 id="greeting">HAPPY WOMEN'S DAY!</h1>
            <p>Wishing you a day as beautiful and inspiring as you are.</p>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
